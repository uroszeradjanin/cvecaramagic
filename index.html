<title>Cvećara Magic — Praćenje prodaje</title>

<style>
:root {
  --cream: #F8F4FB;
  --card: #FFFFFF;
  --ink: #2B2333;
  --ink-soft: #7C7289;
  --plum: #3D2650;
  --iris: #7C4FA0;
  --iris-dark: #5E3A7D;
  --iris-soft: #F0E4F7;
  --lilac: #C9A6DE;
  --lilac-soft: #EDE1F5;
  --gold: #B4863F;
  --gold-soft: #F4E9D6;
  --grid: #E9DEF0;
  --stem: #BFA0D4;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--cream); }
body { font-family: var(--font-body); color: var(--ink); }

.cv-root { max-width: 900px; margin: 0 auto; padding: 28px 20px 70px; }

.cv-header-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.cv-brand { display: flex; align-items: center; gap: 12px; }
.cv-brand-mark { display: flex; align-items: flex-end; }
.cv-brand h1 { font-family: var(--font-display); font-weight: 600; font-size: 28px; letter-spacing: -0.01em; margin: 0; color: var(--plum); }
.cv-sub { margin: 2px 0 0; font-size: 13px; color: var(--ink-soft); }
.stem-divider { width: 100%; height: 20px; margin-top: 14px; display: block; }

.cv-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0 4px; }

.cv-banner { background: var(--gold-soft); border: 1px solid #E4CE9F; color: #6b5423; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin: 16px 0; line-height: 1.5; }
.cv-banner strong { color: #5a4419; }

.cv-btn { font-family: var(--font-body); font-weight: 600; font-size: 13.5px; border-radius: 999px; padding: 10px 18px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: transform .12s ease, box-shadow .12s ease, background .12s ease; }
.cv-btn:focus-visible { outline: 2px solid var(--plum); outline-offset: 2px; }
.cv-btn-primary { background: var(--iris); color: #FBF7FE; box-shadow: 0 2px 8px rgba(124,79,160,.32); }
.cv-btn-primary:hover { background: var(--iris-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,79,160,.38); }
.cv-btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--grid); }
.cv-btn-ghost:hover { background: var(--lilac-soft); color: var(--plum); }
.cv-btn-sm { padding: 7px 13px; font-size: 12.5px; }
.cv-btn svg { display: block; }

.cv-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 22px 0; }
@media (max-width: 700px) { .cv-stats { grid-template-columns: repeat(2, 1fr); } }
.cv-stat-card { background: var(--card); border: 1px solid var(--grid); border-radius: 14px; padding: 14px 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.cv-stat-icon { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
.cv-stat-label { font-size: 12px; color: var(--ink-soft); }
.cv-stat-value { font-family: var(--font-mono); font-size: 19px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
.cv-stat-value-sm { font-size: 14px; font-family: var(--font-body); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.cv-chart-card { background: var(--card); border: 1px solid var(--grid); border-radius: 16px; padding: 18px 16px; margin-bottom: 26px; }
.cv-chart-card h2 { font-family: var(--font-display); font-size: 17px; font-weight: 600; margin: 0 0 14px; color: var(--plum); }
.cv-chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 150px; }
.cv-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
.cv-bar { width: 100%; max-width: 26px; background: var(--iris); border-radius: 5px 5px 0 0; min-height: 3px; transition: background .12s ease; }
.cv-bar:hover { background: var(--iris-dark); }
.cv-bar-label { font-size: 10px; font-family: var(--font-mono); color: var(--ink-soft); }

.cv-list-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.cv-list-head h2 { font-family: var(--font-display); font-size: 19px; font-weight: 600; margin: 0; color: var(--plum); }
.cv-filters { display: flex; gap: 8px; flex-wrap: wrap; }
.cv-filters select { font-family: var(--font-body); font-size: 12.5px; border: 1px solid var(--grid); background: var(--card); color: var(--ink); border-radius: 8px; padding: 7px 10px; }

.cv-empty { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 46px 20px; border: 1px dashed var(--grid); border-radius: 16px; color: var(--ink-soft); font-size: 14px; text-align: center; }

.cv-tickets { display: flex; flex-direction: column; gap: 10px; }
.cv-ticket { position: relative; display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--grid); border-radius: 12px; padding: 14px 16px; overflow: hidden; }
.cv-ticket-notch { position: absolute; width: 14px; height: 14px; background: var(--cream); border-radius: 50%; top: 50%; transform: translateY(-50%); }
.cv-ticket-notch-l { left: -7px; border-right: 1px solid var(--grid); }
.cv-ticket-notch-r { right: 44px; border-left: 1px solid var(--grid); }
.cv-ticket-main { flex: 1; min-width: 0; }
.cv-ticket-row1 { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.cv-ticket-product { font-weight: 700; font-size: 14.5px; color: var(--ink); }
.cv-ticket-total { font-family: var(--font-mono); font-weight: 600; font-size: 14.5px; color: var(--iris); white-space: nowrap; }
.cv-ticket-meta { margin-top: 6px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 12px; color: var(--ink-soft); }
.cv-tag { background: var(--lilac-soft); color: var(--plum); font-weight: 600; padding: 2px 9px; border-radius: 999px; font-size: 11px; }
.cv-code { font-family: var(--font-mono); color: var(--ink-soft); font-size: 11px; }
.cv-pay { color: var(--gold); font-weight: 600; }
.cv-customer { font-style: italic; }
.cv-ticket-del { background: transparent; border: none; color: var(--ink-soft); cursor: pointer; padding: 8px; border-radius: 8px; display: flex; }
.cv-ticket-del:hover { background: var(--iris-soft); color: var(--iris); }

.cv-modal-overlay { position: fixed; inset: 0; background: rgba(43,35,51,.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
.cv-modal { background: var(--cream); border-radius: 18px; padding: 22px; width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 20px 50px rgba(43,35,51,.28); max-height: 90vh; overflow-y: auto; }
.cv-modal-head { display: flex; align-items: center; justify-content: space-between; }
.cv-modal-head h3 { font-family: var(--font-display); font-size: 20px; margin: 0; color: var(--plum); }
.cv-icon-btn { background: transparent; border: none; color: var(--ink-soft); cursor: pointer; padding: 4px; display: flex; }
.cv-icon-btn:hover { color: var(--ink); }

.cv-field { display: flex; flex-direction: column; gap: 5px; flex: 1; font-size: 12.5px; color: var(--ink-soft); font-weight: 600; position: relative; }
.cv-field input, .cv-field select { font-family: var(--font-body); font-size: 14px; color: var(--ink); background: var(--card); border: 1px solid var(--grid); border-radius: 9px; padding: 9px 11px; width: 100%; }
.cv-field input:focus, .cv-field select:focus { outline: 2px solid var(--iris); outline-offset: 1px; }
.cv-field-row { display: flex; gap: 10px; }
.cv-picked-hint { font-size: 11px; color: var(--iris-dark); font-weight: 500; }

.cv-picker { position: relative; }
.cv-picker-input { display: flex; align-items: center; gap: 7px; background: var(--card); border: 1px solid var(--grid); border-radius: 9px; padding: 0 11px; }
.cv-picker-input:focus-within { outline: 2px solid var(--iris); outline-offset: 1px; }
.cv-picker-icon { color: var(--ink-soft); flex-shrink: 0; display: flex; }
.cv-picker-input input { border: none !important; padding: 9px 0 !important; flex: 1; min-width: 0; background: transparent; }
.cv-picker-input input:focus { outline: none !important; }
.cv-picker-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--card); border: 1px solid var(--grid); border-radius: 12px; box-shadow: 0 12px 28px rgba(43,35,51,.16); max-height: 240px; overflow-y: auto; z-index: 10; padding: 6px; display: none; }
.cv-picker-dropdown.open { display: block; }
.cv-picker-empty { padding: 12px 10px; font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; font-weight: 400; }
.cv-picker-item { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: transparent; border: none; text-align: left; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-family: var(--font-body); }
.cv-picker-item:hover { background: var(--iris-soft); }
.cv-picker-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cv-picker-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.cv-picker-code { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-soft); }
.cv-picker-price { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--iris-dark); }

.cv-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }

.cv-toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--plum); color: #FBF7FE; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.2); z-index: 60; }
.cv-toast-error { background: #8C3A3A; }

.cv-footer-note { text-align: center; font-size: 11.5px; color: var(--ink-soft); margin-top: 30px; line-height: 1.6; }
</style>
</head>

    storageOK = !!res;
    return storageOK;
  }).catch(function(){ storageOK = false; return false; });
}

let state = {
  sales: SEED.slice(),
  filterCat: "sve",
  filterRange: "30"
};
let dataReady = false;
let pickedProduct = null; // { code, name, price, category } chosen from picker, or null for free text
function computeStats() {
  const sales = state.sales;
  const today = todayISO();
  const monthKey = today.slice(0, 7);
  const revToday = sales.filter(function(s){ return s.date === today; }).reduce(function(sum,s){ return sum + s.qty * s.price; }, 0);
  const revMonth = sales.filter(function(s){ return s.date.slice(0,7) === monthKey; }).reduce(function(sum,s){ return sum + s.qty * s.price; }, 0);
  const revTotal = sales.reduce(function(sum,s){ return sum + s.qty * s.price; }, 0);

  const byProduct = {};
  sales.forEach(function(s){ byProduct[s.product] = (byProduct[s.product] || 0) + s.qty; });
  let topProduct = "—", topQty = 0;
  Object.keys(byProduct).forEach(function(name){
    if (byProduct[name] > topQty) { topQty = byProduct[name]; topProduct = name; }
  });
  return { revToday: revToday, revMonth: revMonth, revTotal: revTotal, topProduct: topProduct, topQty: topQty };
}

function computeChartData() {
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0, 10);
    days.push({ date: iso, label: formatDateHuman(iso), revenue: 0 });
  }
  const map = {};
  days.forEach(function(d){ map[d.date] = d; });
  state.sales.forEach(function(s){ if (map[s.date]) map[s.date].revenue += s.qty * s.price; });
  return days;
}

function getFilteredSales() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - Number(state.filterRange));
  const cutoffISO = state.filterRange === "sve" ? null : cutoff.toISOString().slice(0, 10);
  return state.sales
    .filter(function(s){ return state.filterCat === "sve" ? true : s.category === state.filterCat; })
    .filter(function(s){ return cutoffISO ? s.date >= cutoffISO : true; })
    .sort(function(a,b){ return a.date < b.date ? 1 : -1; });
}

function renderStatCards(stats) {
  return '' +
  '<section class="cv-stats">' +
    '<div class="cv-stat-card"><div class="cv-stat-icon" style="background:var(--iris-soft);color:var(--iris)">'+ICONS.receipt+'</div><span class="cv-stat-label">Danas</span><span class="cv-stat-value">'+formatRSD(stats.revToday)+'</span></div>' +
    '<div class="cv-stat-card"><div class="cv-stat-icon" style="background:var(--lilac-soft);color:var(--plum)">'+ICONS.calendar+'</div><span class="cv-stat-label">Ovaj mesec</span><span class="cv-stat-value">'+formatRSD(stats.revMonth)+'</span></div>' +
    '<div class="cv-stat-card"><div class="cv-stat-icon" style="background:var(--gold-soft);color:var(--gold)">'+ICONS.trend+'</div><span class="cv-stat-label">Ukupan promet</span><span class="cv-stat-value">'+formatRSD(stats.revTotal)+'</span></div>' +
    '<div class="cv-stat-card"><div class="cv-stat-icon" style="background:var(--lilac-soft);color:var(--plum)">'+ICONS.package+'</div><span class="cv-stat-label">Najprodavanije</span><span class="cv-stat-value cv-stat-value-sm" title="'+esc(stats.topProduct)+'">'+(stats.topProduct === "—" ? "—" : esc(stats.topProduct)+' ('+stats.topQty+')')+'</span></div>' +
  '</section>';
}

function renderChart(chartData) {
  const max = Math.max.apply(null, chartData.map(function(d){ return d.revenue; }).concat([1]));
  const bars = chartData.map(function(d){
    const h = Math.max(3, Math.round((d.revenue / max) * 140));
    return '<div class="cv-bar-col"><div class="cv-bar" style="height:'+h+'px" title="'+esc(d.label)+': '+formatRSD(d.revenue)+'"></div><span class="cv-bar-label">'+esc(d.label)+'</span></div>';
  }).join('');
  return '<section class="cv-chart-card"><h2>Promet — poslednjih 14 dana</h2><div class="cv-chart-bars">'+bars+'</div></section>';
}

function renderTicket(s) {
  const payLabel = (PAYMENTS.find(function(p){ return p.id === s.payment; }) || {}).label || s.payment;
  return '' +
  '<div class="cv-ticket" data-id="'+s.id+'">' +
    '<div class="cv-ticket-notch cv-ticket-notch-l"></div>' +
    '<div class="cv-ticket-notch cv-ticket-notch-r"></div>' +
    '<div class="cv-ticket-main">' +
      '<div class="cv-ticket-row1"><span class="cv-ticket-product">'+esc(s.product)+'</span><span class="cv-ticket-total">'+formatRSD(s.qty * s.price)+'</span></div>' +
      '<div class="cv-ticket-meta">' +
        '<span class="cv-tag">'+esc(s.category)+'</span>' +
        (s.code != null ? '<span class="cv-code">#'+s.code+'</span>' : '') +
        '<span>'+s.qty+' × '+formatRSD(s.price)+'</span>' +
        '<span>'+formatDateHuman(s.date)+'</span>' +
        '<span class="cv-pay">'+esc(payLabel)+'</span>' +
        (s.customer ? '<span class="cv-customer">za: '+esc(s.customer)+'</span>' : '') +
      '</div>' +
    '</div>' +
    '<button class="cv-ticket-del" data-action="delete" data-id="'+s.id+'" aria-label="Obriši prodaju">'+ICONS.trash+'</button>' +
  '</div>';
}

function renderList() {
  const filtered = getFilteredSales();
  const catOptions = CATEGORIES.map(function(c){
    return '<option value="'+esc(c)+'"'+(state.filterCat===c?' selected':'')+'>'+esc(c)+'</option>';
  }).join('');
  const rangeLabels = { "7":"Poslednjih 7 dana", "30":"Poslednjih 30 dana", "365":"Poslednjih godinu dana", "sve":"Sve vreme" };
  const rangeOptions = Object.keys(rangeLabels).map(function(k){
    return '<option value="'+k+'"'+(state.filterRange===k?' selected':'')+'>'+rangeLabels[k]+'</option>';
  }).join('');

  const body = filtered.length === 0
    ? '<div class="cv-empty">'+ICONS.flower+'<p>Nema zabeleženih prodaja za izabrani period.</p><button class="cv-btn cv-btn-ghost" data-action="open-form">Dodaj prvu prodaju</button></div>'
    : '<div class="cv-tickets">'+filtered.map(renderTicket).join('')+'</div>';

  return '' +
  '<section class="cv-list-section">' +
    '<div class="cv-list-head">' +
      '<h2>Evidencija prodaje</h2>' +
      '<div class="cv-filters">' +
        '<select id="filterCat"><option value="sve"'+(state.filterCat==="sve"?' selected':'')+'>Sve kategorije</option>'+catOptions+'</select>' +
        '<select id="filterRange">'+rangeOptions+'</select>' +
      '</div>' +
    '</div>' +
    body +
  '</section>';
}

function renderTopBar() {
  return '' +
  '<header class="cv-header">' +
    '<div class="cv-header-top">' +
      '<div class="cv-brand">' +
        '<div class="cv-brand-mark" style="color:var(--iris)">'+ICONS.flower+'</div>' +
        '<div><h1>Cvećara Magic</h1><p class="cv-sub">Praćenje dnevne prodaje · '+PRODUCTS.length+' proizvoda u šifarniku'+(storageAvailable ? ' · <span style="color:var(--iris-dark);font-weight:600">deljeno uživo</span>' : ' · <span style="color:#8C3A3A;font-weight:600">samo ovaj uređaj</span>')+'</p></div>' +
      '</div>' +
      '<button class="cv-btn cv-btn-primary" data-action="open-form">'+ICONS.plus+'Nova prodaja</button>' +
    '</div>' +
    '<svg class="stem-divider" viewBox="0 0 600 24" preserveAspectRatio="none">' +
      '<path d="M0 12 C 100 4, 200 20, 300 12 S 500 4, 600 12" stroke="var(--stem)" stroke-width="1.5" fill="none"/>' +
      [40,140,240,340,440,540].map(function(x,i){ return '<circle cx="'+x+'" cy="'+(i%2===0?8:16)+'" r="3.2" fill="var(--iris)" opacity="0.85"/>'; }).join('') +
    '</svg>' +
    (!storageAvailable ? '<div class="cv-banner"><strong>Napomena:</strong> ova kopija nije otvorena kao živi Claude artefakt, pa promene neće biti vidljive drugim uređajima. Da bi svi (i sa telefona) videli iste podatke, otvori aplikaciju preko podeljenog linka artefakta, ne kao skinuti fajl. Za sada radi samo lokalni backup dugmad ispod.</div>' :
     !storageOK ? '<div class="cv-banner"><strong>Napomena:</strong> poslednja promena nije uspela da se sačuva na deljenom prostoru — proveri konekciju i probaj „Osveži", ili izvezi backup da ništa ne izgubiš.</div>' : '') +
    '<div class="cv-toolbar">' +
      '<button class="cv-btn cv-btn-ghost cv-btn-sm" data-action="refresh">'+ICONS.refresh+'Osveži</button>' +
      '<button class="cv-btn cv-btn-ghost cv-btn-sm" data-action="export-json">'+ICONS.download+'Izvezi backup (JSON)</button>' +
      '<button class="cv-btn cv-btn-ghost cv-btn-sm" data-action="export-csv">'+ICONS.download+'Izvezi za Excel (CSV)</button>' +
      '<button class="cv-btn cv-btn-ghost cv-btn-sm" data-action="import-json">'+ICONS.upload+'Uvezi backup</button>' +
    '</div>' +
  '</header>';
}

function renderApp() {
  const stats = computeStats();
  const chartData = computeChartData();
  document.getElementById("app").innerHTML =
    renderTopBar() +
    renderStatCards(stats) +
    renderChart(chartData) +
    renderList();
}
function openModal() {
  pickedProduct = null;
  const catOptions = CATEGORIES.map(function(c){ return '<option value="'+esc(c)+'">'+esc(c)+'</option>'; }).join('');
  const payOptions = PAYMENTS.map(function(p){ return '<option value="'+p.id+'">'+esc(p.label)+'</option>'; }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'cv-modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.innerHTML = '' +
  '<div class="cv-modal" id="modalBox">' +
    '<div class="cv-modal-head"><h3>Nova prodaja</h3><button type="button" class="cv-icon-btn" data-action="close-form" aria-label="Zatvori">'+ICONS.x+'</button></div>' +
    '<label class="cv-field">' +
      '<span>Proizvod</span>' +
      '<div class="cv-picker" id="picker">' +
        '<div class="cv-picker-input"><span class="cv-picker-icon">'+ICONS.search+'</span><input type="text" id="ppInput" placeholder="Pretraži po nazivu ili šifri…" autocomplete="off"></div>' +
        '<div class="cv-picker-dropdown" id="ppDropdown"></div>' +
      '</div>' +
      '<span class="cv-picked-hint" id="pickedHint" style="display:none"></span>' +
    '</label>' +
    '<div class="cv-field-row">' +
      '<label class="cv-field"><span>Kategorija</span><select id="fCategory">'+catOptions+'</select></label>' +
      '<label class="cv-field"><span>Datum</span><input type="date" id="fDate" value="'+todayISO()+'"></label>' +
    '</div>' +
    '<div class="cv-field-row">' +
      '<label class="cv-field"><span>Količina</span><input type="number" id="fQty" min="1" value="1"></label>' +
      '<label class="cv-field"><span>Cena po komadu (RSD)</span><input type="number" id="fPrice" min="0" placeholder="0"></label>' +
    '</div>' +
    '<div class="cv-field-row">' +
      '<label class="cv-field"><span>Kupac (opciono)</span><input type="text" id="fCustomer" placeholder="Ime kupca"></label>' +
      '<label class="cv-field"><span>Način plaćanja</span><select id="fPayment">'+payOptions+'</select></label>' +
    '</div>' +
    '<div class="cv-modal-actions">' +
      '<button type="button" class="cv-btn cv-btn-ghost" data-action="close-form">Otkaži</button>' +
      '<button type="button" class="cv-btn cv-btn-primary" data-action="submit-form">Sačuvaj prodaju</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(overlay);

  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });

  const ppInput = document.getElementById('ppInput');
  const ppDropdown = document.getElementById('ppDropdown');

  function renderDropdown(query) {
    const q = query.trim().toLowerCase();
    if (!q) { ppDropdown.classList.remove('open'); ppDropdown.innerHTML = ''; return; }
    const byCode = /^\d+$/.test(q);
    const results = PRODUCTS.filter(function(p){
      return byCode ? String(p.code).indexOf(q) === 0 : p.name.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 30);
    if (results.length === 0) {
      ppDropdown.innerHTML = '<div class="cv-picker-empty">Nema poklapanja u šifarniku — koristiće se uneti naziv, podesi kategoriju i cenu ručno.</div>';
    } else {
      ppDropdown.innerHTML = results.map(function(p){
        return '<button type="button" class="cv-picker-item" data-code="'+p.code+'"><span class="cv-picker-name">'+esc(p.name)+'</span><span class="cv-picker-meta"><span class="cv-picker-code">#'+p.code+'</span><span class="cv-picker-price">'+formatRSD(p.price)+'</span></span></button>';
      }).join('');
    }
    ppDropdown.classList.add('open');
  }

  ppInput.addEventListener('input', function(){
    pickedProduct = null;
    document.getElementById('pickedHint').style.display = 'none';
    renderDropdown(ppInput.value);
  });
  ppInput.addEventListener('focus', function(){ if (ppInput.value.trim()) renderDropdown(ppInput.value); });

  ppDropdown.addEventListener('click', function(e){
    const btn = e.target.closest('.cv-picker-item');
    if (!btn) return;
    const code = Number(btn.getAttribute('data-code'));
    const p = PRODUCTS.find(function(pr){ return pr.code === code; });
    if (!p) return;
    pickedProduct = p;
    ppInput.value = p.name;
    document.getElementById('fCategory').value = p.category;
    document.getElementById('fPrice').value = p.price;
    const hint = document.getElementById('pickedHint');
    hint.style.display = 'block';
    hint.textContent = 'Iz šifarnika: šifra #' + p.code + ' · ' + formatRSD(p.price) + '/kom (možeš izmeniti ispod)';
    ppDropdown.classList.remove('open');
    ppDropdown.innerHTML = '';
  });

  document.addEventListener('mousedown', outsideClickHandler);
  function outsideClickHandler(e) {
    const picker = document.getElementById('picker');
    if (picker && !picker.contains(e.target)) {
      ppDropdown.classList.remove('open');
    }
  }
  overlay._cleanup = function(){ document.removeEventListener('mousedown', outsideClickHandler); };

  setTimeout(function(){ ppInput.focus(); }, 30);
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  if (overlay) {
    if (overlay._cleanup) overlay._cleanup();
    overlay.remove();
  }
}

function submitForm() {
  const product = document.getElementById('ppInput').value.trim();
  const category = document.getElementById('fCategory').value;
  const date = document.getElementById('fDate').value || todayISO();
  const qty = Math.max(1, Number(document.getElementById('fQty').value) || 1);
  const price = Number(document.getElementById('fPrice').value);
  const customer = document.getElementById('fCustomer').value.trim();
  const payment = document.getElementById('fPayment').value;

  if (!product || !price || price <= 0) {
    showToast('Unesi naziv proizvoda i cenu veću od nule.', 'error');
    return;
  }

  const entry = {
    id: uid(),
    date: date,
    product: product,
    code: pickedProduct ? pickedProduct.code : null,
    category: category,
    qty: qty,
    price: price,
    customer: customer,
    payment: payment
  };
  closeModal();
  loadSalesAsync().then(function(latest){
    if (latest) state.sales = latest;
    state.sales.unshift(entry);
    return saveSalesAsync(state.sales);
  }).then(function(ok){
    renderApp();
    showToast(ok || !storageAvailable ? ('Dodato: ' + entry.product) : ('Dodato, ali nije sinhronizovano — probaj „Osveži": ' + entry.product), ok || !storageAvailable ? 'ok' : 'error');
  });
}

function deleteSale(id) {
  loadSalesAsync().then(function(latest){
    if (latest) state.sales = latest;
    const target = state.sales.find(function(s){ return s.id === id; });
    state.sales = state.sales.filter(function(s){ return s.id !== id; });
    return saveSalesAsync(state.sales).then(function(){ return target; });
  }).then(function(target){
    renderApp();
    if (target) showToast('Obrisano: ' + target.product, 'ok');
  });
}

function refreshSales() {
  loadSalesAsync().then(function(latest){
    if (latest) { state.sales = latest; renderApp(); showToast('Osveženo.', 'ok'); }
    else showToast(storageAvailable ? 'Nema promena.' : 'Deljeno čuvanje nije dostupno u ovom režimu.', storageAvailable ? 'ok' : 'error');
  });
}

let toastTimer = null;
function showToast(msg, kind) {
  let toast = document.getElementById('toast');
  if (toast) toast.remove();
  toast = document.createElement('div');
  toast.id = 'toast';
  toast.className = 'cv-toast' + (kind === 'error' ? ' cv-toast-error' : '');
  toast.textContent = msg;
  document.body.appendChild(toast);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toast.remove(); }, 2800);
}
function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

function exportJSON() {
  const content = JSON.stringify(state.sales, null, 2);
  downloadBlob(content, 'cvecara-backup-' + todayISO() + '.json', 'application/json');
  showToast('Backup preuzet (JSON).', 'ok');
}

function csvField(v) {
  const s = String(v === null || v === undefined ? '' : v);
  if (s.indexOf(';') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function exportCSV() {
  const header = ['Datum','Proizvod','Šifra','Kategorija','Količina','Cena po komadu','Ukupno','Kupac','Način plaćanja'];
  const rows = state.sales.map(function(s){
    return [s.date, s.product, s.code == null ? '' : s.code, s.category, s.qty, s.price, s.qty*s.price, s.customer, (PAYMENTS.find(function(p){return p.id===s.payment;})||{}).label || s.payment]
      .map(csvField).join(';');
  });
  const csv = '\ufeff' + header.map(csvField).join(';') + '\n' + rows.join('\n');
  downloadBlob(csv, 'cvecara-prodaja-' + todayISO() + '.csv', 'text/csv;charset=utf-8');
  showToast('CSV preuzet — otvori ga u Excelu.', 'ok');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('bad format');
      const valid = data.every(function(s){ return s && typeof s === 'object' && 'product' in s && 'price' in s && 'qty' in s; });
      if (!valid) throw new Error('bad format');
      const proceed = window.confirm('Ovo će zameniti trenutne podatke (' + state.sales.length + ' stavki) sa ' + data.length + ' stavki iz fajla. Nastaviti?');
      if (!proceed) return;
      state.sales = data.map(function(s){ return Object.assign({ id: s.id || uid() }, s); });
      saveSalesAsync(state.sales).then(function(){
        renderApp();
        showToast('Uvezeno ' + data.length + ' stavki.', 'ok');
      });
    } catch (err) {
      showToast('Fajl nije validan backup ove aplikacije.', 'error');
    }
  };
  reader.readAsText(file);
}

document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.getAttribute('data-action');
  if (action === 'open-form') openModal();
  else if (action === 'close-form') closeModal();
  else if (action === 'submit-form') submitForm();
  else if (action === 'delete') deleteSale(btn.getAttribute('data-id'));
  else if (action === 'export-json') exportJSON();
  else if (action === 'export-csv') exportCSV();
  else if (action === 'import-json') document.getElementById('importFileInput').click();
  else if (action === 'refresh') refreshSales();
});

document.addEventListener('change', function(e) {
  if (e.target.id === 'filterCat') { state.filterCat = e.target.value; renderApp(); }
  else if (e.target.id === 'filterRange') { state.filterRange = e.target.value; renderApp(); }
  else if (e.target.id === 'importFileInput') {
    const file = e.target.files[0];
    if (file) importJSON(file);
    e.target.value = '';
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

function renderLoading() {
  document.getElementById("app").innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;gap:10px;height:280px;color:var(--ink-soft)">' +
    '<span style="color:var(--iris)">'+ICONS.flower+'</span><span>Učitavam deljene podatke…</span></div>';
}

function initApp() {
  renderLoading();
  loadSalesAsync().then(function(latest){
    if (latest) {
      state.sales = latest;
    } else if (storageAvailable) {
      // first time this shared key is used — seed it
      saveSalesAsync(state.sales);
    }
    dataReady = true;
    renderApp();
  });
}

// Poll for changes from other devices/users every 7s (only while no modal is open,
// so we never yank the form out from under someone mid-entry).
setInterval(function(){
  if (!storageAvailable || !dataReady) return;
  if (document.getElementById('modalOverlay')) return;
  loadSalesAsync().then(function(latest){
    if (!latest) return;
    if (JSON.stringify(latest) !== JSON.stringify(state.sales)) {
      state.sales = latest;
      renderApp();
    }
  });
}, 7000);

initApp();
</script>
</body>
</html>
